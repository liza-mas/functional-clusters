default_stages: [pre-commit]
fail_fast: false

repos:
  - repo: local
    hooks:
      - id: gofmt
        name: gofmt
        entry: gofmt -w -l
        language: system
        types: [go]
      - id: go-test
        name: go test
        entry: sh -c 'GOPATH="$HOME/.cache/go" GOMODCACHE="$HOME/.cache/go/pkg/mod" GOCACHE="$HOME/.cache/go/build" go test ./...'
        language: system
        pass_filenames: false
      - id: go-vet
        name: go vet
        entry: sh -c 'GOPATH="$HOME/.cache/go" GOMODCACHE="$HOME/.cache/go/pkg/mod" GOCACHE="$HOME/.cache/go/build" go vet ./...'
        language: system
        files: \.go$
        pass_filenames: false
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-merge-conflict
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-toml
  - repo: meta
    hooks:
      - id: check-useless-excludes
